<html lang="en" xmlns="http://www.w3.org/1999/xhtml">
  <head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
    <meta name="color-scheme" content="light" />
    <meta name="supported-color-schemes" content="light" />
    <style type="text/css">
      /* Outlook-safe CSS reset */
      body,
      table,
      td,
      div,
      p,
      a {
        -webkit-text-size-adjust: 100%;
        -ms-text-size-adjust: 100%;
        margin: 0;
        padding: 0;
      }

      table {
        border-collapse: collapse;
        mso-table-lspace: 0pt;
        mso-table-rspace: 0pt;
      }

      img {
        border: 0;
        outline: none;
        text-decoration: none;
        -ms-interpolation-mode: nearest-neighbor;
      }

      body {
        margin: 0;
        padding: 0;
        min-width: 100% !important;
        background-color: #00588d;
        color: #222222;
      }

      p {
        margin: 20px 0;
        padding: 0;
      }

      .email-body {
        width: 100%;
        background-color: #00588d;
      }

      .container {
        width: 100%;
        max-width: 800px;
        margin: 0 auto;
        background-color: #e8f4f8;
        padding: 40px;
        mso-padding-alt: 40px;
      }

      /* Outlook-safe table styles */
      .details {
        width: 100%;
        border-collapse: collapse;
        background-color: #ffffff;
        margin-top: 20px;
      }

      .details tr {
        background-color: #ffffff;
      }

      .details tr:nth-child(even) {
        background-color: #f9f9f9;
      }

      .details td {
        padding: 12px 15px;
        border-bottom: 1px solid #e0e0e0;
        font-family: Arial, sans-serif;
        font-size: 14px;
        color: #333333;
      }

      .details .label {
        font-weight: bold;
        background-color: #e8f4f8;
        color: #00588d;
        width: 40%;
        vertical-align: top;
      }

      .details .value {
        color: #333333;
      }
    </style>
  </head>
  <body style="margin: 0; padding: 0; background-color: #00588d; width: 100% !important">
    <table
      class="email-body"
      width="100%"
      cellpadding="0"
      cellspacing="0"
      border="0"
      style="
        width: 100%;
        background-color: #00588d;
        mso-table-lspace: 0pt;
        mso-table-rspace: 0pt;
      "
    >
      <tr>
        <td
          align="center"
          valign="top"
          style="padding: 50px 20px; background-color: #00588d"
        >
          <table
            class="container"
            width="750"
            cellpadding="0"
            cellspacing="0"
            border="0"
            style="
              max-width: 750px;
              width: 100%;
              background-color: #e8f4f8;
              border-collapse: collapse;
            "
          >
            <tr>
              <td style="padding: 40px 40px 0 40px">
                <table
                  width="100%"
                  cellpadding="0"
                  cellspacing="0"
                  border="0"
                  style="border-collapse: collapse"
                >
                  <tr>
                    <td
                      style="
                        font-family: Arial, sans-serif;
                        font-size: 14px;
                        line-height: 1.6;
                        color: #333333;
                      "
                    >
                      <p>Beste Thijs Vonk,</p>

                      <p>Op Supportal is een nieuwsbericht gepubliceerd.</p>

                      <h3>Nieuw</h3>

                      <p>Test https://google.com<br /><br />Nieuwe regel</p>

                      <p>Klik op onderstaande link om het nieuwsbericht in te zien:</p>

                      <p>
                        <a href="http://localhost:3000/nieuwsberichten/61"
                          >http://localhost:3000/nieuwsberichten/61</a
                        >
                      </p>
                    </td>
                  </tr>
                </table>

                <!-- Footer -->
                <table
                  width="100%"
                  cellpadding="0"
                  cellspacing="0"
                  border="0"
                  style="border-collapse: collapse"
                >
                  <tr>
                    <td
                      style="
                        padding: 20px 0;
                        font-family: Arial, sans-serif;
                        font-size: 14px;
                      "
                    >
                      <p style="margin: 5px 0; padding: 0">Met vriendelijke groet,</p>
                      <p style="margin: 5px 0; padding: 0">Supportal</p>
                    </td>
                  </tr>
                  <tr>
                    <td
                      valign="center"
                      style="
                        padding: 20px 0;
                        font-family: Arial, sans-serif;
                        font-size: 12px;
                        color: #666666;
                        text-align: center;
                      "
                    >
                      <p style="margin: 0 0 20px 0; padding: 0">
                        Dit bericht is automatisch gegenereerd.
                      </p>
                    </td>
                  </tr>
                </table>
              </td>
            </tr>
            <tr>
              <td>
                <table
                  width="100%"
                  cellpadding="0"
                  cellspacing="0"
                  border="0"
                  style="border-collapse: collapse"
                >
                  <tr>
                    <td style="height: 5px; width: 20%; background: #00588d"></td>
                    <td style="height: 5px; width: 20%; background: #76a211"></td>
                    <td style="height: 5px; width: 20%; background: #5bc0de"></td>
                    <td style="height: 5px; width: 20%; background: #ff5a00"></td>
                    <td style="height: 5px; width: 20%; background: #ff0021"></td>
                  </tr>
                </table>
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
