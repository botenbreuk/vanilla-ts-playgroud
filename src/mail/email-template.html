    <style type="text/css">
      /* Outlook-safe CSS reset */
      body,
      table,
      td,
      div,
      p,
      a {
        -webkit-text-size-adjust: 100%;
        -ms-text-size-adjust: 100%;
        margin: 0;
        padding: 0;
      }

      table {
        border-collapse: collapse;
        mso-table-lspace: 0pt;
        mso-table-rspace: 0pt;
      }

      img {
        border: 0;
        outline: none;
        text-decoration: none;
        -ms-interpolation-mode: nearest-neighbor;
      }

      body {
        margin: 0;
        padding: 0;
        min-width: 100% !important;
        background-color: #00588d;
        color: #222222;
      }

      .email-body {
        width: 100%;
        background-color: #00588d;
      }

      .email-wrapper {
        background-color: #00588d;
        padding: 50px 20px;
      }

      .container {
        width: 100%;
        max-width: 600px;
        margin: 0 auto;
        background-color: #e8f4f8;
        padding: 40px;
        border-radius: 8px;
        mso-padding-alt: 40px 40px 40px 40px;
      }

      .header {
        margin-bottom: 30px;
        text-align: center;
      }

      .header h1 {

        font-size: 24px;
        font-weight: bold;
        color: #00588d;
        margin: 0;
        padding: 0;
      }

      .content {
        margin-bottom: 30px;
        font-family: Arial, sans-serif;
        font-size: 14px;
        line-height: 1.6;
        color: #333333;
      }

      .content p {
        margin: 10px 0;
        padding: 0;
      }

      /* Outlook-safe table styles */
      .user-table {
        width: 100%;
        border-collapse: collapse;
        background-color: #ffffff;
        margin-top: 20px;
      }

      .user-table tr {
        background-color: #ffffff;
      }

      .user-table tr:nth-child(even) {
        background-color: #f9f9f9;
      }

      .user-table td {
        padding: 12px 15px;
        border-bottom: 1px solid #e0e0e0;
        font-family: Arial, sans-serif;
        font-size: 13px;
        color: #333333;
      }

      .user-table .label {
        font-weight: bold;
        background-color: #e8f4f8;
        color: #00588d;
        width: 40%;
        vertical-align: top;
      }

      .user-table .value {

        padding-top: 20px;
        border-top: 1px solid #d0d0d0;
        text-align: center;
        font-family: Arial, sans-serif;
        font-size: 12px;
        color: #666666;
      }

      .footer p {
        margin: 5px 0;
        padding: 0;
